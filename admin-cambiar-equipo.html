<!doctype html><html lang='es'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Cambiar equipo</title><style>
body{margin:0;background:#071020;color:#fff;font-family:Arial,sans-serif;padding:38px;background-image:radial-gradient(circle at 90% 0%,rgba(142,49,255,.35),transparent 35%)}
.card{max-width:980px;margin:auto;background:#0b1428;border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:28px}
h1{font-size:38px;margin:0 0 8px}p{color:#bdc7d7}label{display:block;margin-top:16px;margin-bottom:7px;font-weight:900}select,input{width:100%;box-sizing:border-box;padding:15px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:#071020;color:#fff;font-weight:800;font-size:16px}
button{width:100%;margin-top:22px;border:0;border-radius:12px;padding:16px;background:linear-gradient(135deg,#7d25ff,#b64cff);color:#fff;font-weight:1000;font-size:16px;cursor:pointer}
.note{margin-top:18px;border:1px solid rgba(186,255,53,.25);background:rgba(186,255,53,.08);border-radius:14px;padding:14px;color:#dfffb0}.ok{color:#baff35}.bad{color:#ff6680}a{color:#c084ff;font-weight:900;text-decoration:none}
</style></head><body><div class='card'><h1>Cambiar equipo de competición</h1><p>Los partidos ya jugados se quedan con el equipo antiguo y su resultado. Las jornadas pendientes/futuras pasan al equipo nuevo.</p>
<label>Competición</label><select id='comp'></select><label>Equipo que sale</label><select id='sale'></select><label>Equipo que entra</label><input id='entra' placeholder='Nombre del equipo nuevo'><button id='guardar'>Guardar cambio</button><div class='note'><b>No borra historial:</b> guarda el cambio en data.json.</div><p id='msg'></p><p><a href='/'>← Volver a la web</a></p></div>
<script>
const comps=[{"id": "COMP-0001", "nombre": "Élite League", "equipos": ["Catalunya Lliure", "Alegria FCA", "COVAYERS FC", "Fuzeteam FC B", "🫂 Coolegas CF", "🎯 Club Élite XL", "Ghost Unit", "Hamoods CF", "Unió catalana", "BLACK MECANIC", "Billar FC", "Coral Springs A"]}, {"id": "COMP-0002", "nombre": "Copa Inaugural Élite", "equipos": ["🚜 Catalunya Lliure", "🎯 Alegria FCA", "🐹 COVAYERS FC", "🚀 Fuzeteam FC B", "🫂 Coolegas CF", "🎯 Club Élite XL", "🔝 Ghost Unit", "🦁 Hamoods CF"]}, {"id": "COMP-0003", "nombre": "Silver League", "equipos": ["🇲🇽 Tllres Mazeta", "🫂 TEIDE CITY", "🎱 Billar FC", "🍆 Samba do Espana", "⚡️ Coral Springs A", "❤️‍🔥 BLACK MECANIC", "👹 Naeva FC", "🛡️ Uniò catalana"]}, {"id": "COMP-0004", "nombre": "Copa Inaugural Silver", "equipos": ["🇲🇽 Tllres Mazeta", "🫂 TEIDE CITY", "🎱 Billar FC", "🍆 Samba do Espana", "⚡️ Coral Springs A", "❤️‍🔥 BLACK MECANIC", "👹 Naeva FC", "🛡️ Uniò catalana"]}];
function fillComps(){comp.innerHTML=comps.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');fillTeams();}
function fillTeams(){const c=comps.find(x=>x.id===comp.value)||comps[0];sale.innerHTML=(c?.equipos||[]).map(n=>`<option value="${n}">${n}</option>`).join('');}
comp.onchange=fillTeams;
guardar.onclick=async()=>{msg.textContent='Guardando...';msg.className='';const r=await fetch('/api/admin/cambiar-equipo-competicion',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({compId:comp.value,equipoSale:sale.value,equipoEntra:entra.value})});const d=await r.json().catch(()=>({ok:false,message:'Error'}));if(!d.ok){msg.textContent=d.message||'No se pudo guardar';msg.className='bad';return;}msg.textContent=`Guardado. Jugados conservados: ${d.cambio.partidosJugadosConservados} · Futuros actualizados: ${d.cambio.partidosFuturosActualizados}`;msg.className='ok';};
fillComps();
</script></body></html>
